
{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <div>
        <h1>Категории</h1>
        <p>Управление категориями доходов и расходов</p>
    </div>
</div>

<div class="row g-4">
    <div class="col-lg-4">
        <section class="panel">
            <h2 class="mb-3">Добавить категорию</h2>
            <form method="post" action="{{ url_for('add_category') }}" class="modal-form">
                <label>Название</label>
                <input name="name" class="form-control rounded-4" placeholder="Например: Учеба" required>

                <label>Тип</label>
                <select name="kind" class="form-select rounded-4">
                    <option>Расход</option>
                    <option>Доход</option>
                </select>

                <label>Иконка / emoji</label>
                <input name="icon" class="form-control rounded-4" placeholder="Например: 📚">

                <button class="btn btn-primary rounded-4 w-100 mt-3">Добавить</button>
            </form>
        </section>
    </div>

    <div class="col-lg-8">
        <section class="panel">
            <h2 class="mb-3">Список категорий</h2>
            <div class="category-grid">
                {% for c in categories %}
                    <div class="category-card">
                        <div>
                            <strong>{{ c.icon }} {{ c.name }}</strong>
                            <span>{{ type_ru.get(c.kind, c.kind) }}</span>
                        </div>
                        <form method="post" action="{{ url_for('delete_category', cat_id=c.id) }}" onsubmit="return confirm('Удалить категорию?')">
                            <button class="btn btn-sm btn-outline-danger rounded-4">Удалить</button>
                        </form>
                    </div>
                {% endfor %}
            </div>
        </section>
    </div>
</div>
{% endblock %}
